<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaar IA - Asistente Personal</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, #007bff, #00ff88);
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
        }
        .btn-escuchar {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }
        .btn-escuchar:hover {
            background-color: #0056b3;
        }
        #status {
            margin-top: 20px;
            font-style: italic;
            color: #b3b3b3;
        }
        #output {
            margin-top: 15px;
            font-weight: bold;
            color: #00ff88;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar">Jaar IA</div>
    <button class="btn-escuchar" id="btnActivar">Activar Jaar IA</button>
    <p id="status">Presiona el botón para hablar...</p>
    <p id="output"></p>
</div>

<script>
    const btnActivar = document.getElementById('btnActivar');
    const statusText = document.getElementById('status');
    const outputText = document.getElementById('output');

    // Configuración del reconocimiento de voz nativo
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (!SpeechRecognition) {
        alert("Tu navegador no soporta reconocimiento de voz. Usa Google Chrome.");
    } else {
        recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        // Al iniciar la escucha real
        recognition.onstart = () => {
            statusText.innerText = "Escuchando... ¡Habla ahora!";
        };

        // Captura de voz exitosa
        recognition.onresult = (event) => {
            const comando = event.results[0][0].transcript.toLowerCase();
            statusText.innerText = "Procesando...";
            outputText.innerText = `Dijiste: "${comando}"`;
            procesarComando(comando);
        };

        // Si ocurre un error
        recognition.onerror = (event) => {
            console.log("Error de reconocimiento:", event.error);
            if (event.error === 'no-speech') {
                statusText.innerText = "No se detectó voz. Intenta de nuevo.";
            } else {
                statusText.innerText = "Error: " + event.error;
            }
        };

        // Cierre del micrófono
        recognition.onspeechend = () => {
            recognition.stop();
        };
    }
