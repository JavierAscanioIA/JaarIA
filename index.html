<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaar IA - Asistente Personal</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container { text-align: center; padding: 20px; }
        .avatar {
            width: 120px; height: 120px;
            background: linear-gradient(45deg, #007bff, #00ff88);
            border-radius: 50%; margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 24px;
        }
        .btn-escuchar {
            background-color: #007bff; color: white; border: none;
            padding: 15px 30px; font-size: 18px; border-radius: 50px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }
        #status { margin-top: 20px; color: #b3b3b3; font-style: italic; }
        #output { margin-top: 15px; font-weight: bold; color: #00ff88; }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar">Jaar IA</div>
    <button class="btn-escuchar" id="btnActivar">Activar Jaar IA</button>
    <p id="status">Presiona el botón para comenzar...</p>
    <p id="output"></p>
</div>

<script>
    const btnActivar = document.getElementById('btnActivar');
    const statusText = document.getElementById('status');
    const outputText = document.getElementById('output');

    // Configuración segura del Reconocimiento de Voz
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = () => {
            statusText.innerText = "Escuchando... ¡Habla ahora!";
        };

        recognition.onresult = (event) => {
            const comando = event.results[0][0].transcript.toLowerCase();
            outputText.innerText = "Dijiste: " + comando;
            procesarComando(comando);
        };

        recognition.onerror = (event) => {
            statusText.innerText = "Error de micrófono: " + event.error;
        };

        recognition.onspeechend = () => {
            recognition.stop();
            statusText.innerText = "Presiona el botón para hablar...";
        };
    }

    // Botón con inicio forzado directo
    btnActivar.addEventListener('click', () => {
        try {
            statusText.innerText = "Iniciando voz...";
            outputText.innerText = "";

            const utterance = new SpeechSynthesisUtterance("¿En qué puedo ayudarte?");
            utterance.lang = 'es-ES';

            utterance.onend = () => {
                if (recognition) {
                    try {
                        recognition.start();
                    } catch(err) {
                        statusText.innerText = "El micrófono ya estaba activo.";
                    }
                } else {
                    alert("Tu navegador no es compatible con reconocimiento de voz.");
                }
            };

            window.speechSynthesis.speak(utterance);
        } catch (error) {
            alert("Error crítico al presionar el botón: " + error.message);
        }
    });

    function procesarComando(comando) {
        // 1. Comando específico: YouTube
        if (comando.includes('youtube') || comando.includes('abre youtube')) {
            statusText.innerText = "Abriendo YouTube...";
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Abriendo YouTube"));
            window.open('https://youtube.com', '_blank');
            return;
        }

        // 2. Comando específico: Banco de Venezuela
        if (comando.includes('banco venezuela') || comando.includes('banco de venezuela') || comando.includes('abre el banco')) {
            statusText.innerText = "Abriendo Banco de Venezuela...";
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Abriendo la página del Banco de Venezuela"));
            window.open('https://bancodevenezuela.com', '_blank');
            return;
        }

        // 3. Comando específico: Mercado Libre VZLA (Solo si especificas Mercado Libre)
        if (comando.includes('mercado libre') || comando.includes('mercadolibre')) {
            let articulo = comando.replace('busca en mercado libre', '').replace('buscar en mercado libre', '').replace('mercado libre', '').replace('busca', '').trim();
            statusText.innerText = "Buscando en Mercado Libre...";
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Buscando en Mercado Libre"));
            window.open("https://mercadolibre.com.ve" + encodeURIComponent(articulo), '_blank');
            return;
        }

        // 4. BUSCADOR UNIVERSAL (Para cualquier otra cosa que le hables)
        // Limpiamos palabras de activación comunes para refinar la búsqueda
        let busquedaLimpia = comando.replace(/^busca\s+|^buscar\s+|^abre\s+|^encuentra\s+|^qué\s+es\s+/g, '').trim();
        
        // Si el usuario solo dijo palabras sueltas de activación, usamos todo el comando completo
        if (busquedaLimpia === "") { busquedaLimpia = comando; }

        statusText.innerText = "Buscando en Google: " + busquedaLimpia;
        window.speechSynthesis.speak(new SpeechSynthesisUtterance("Buscando " + busquedaLimpia));
        window.open("https://google.com" + encodeURIComponent(busquedaLimpia), '_blank');
    }
</script>

</body>
</html>
